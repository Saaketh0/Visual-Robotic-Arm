[pytest]
# Some ROS2 Python environments auto-install `launch_testing`, whose pytest plugin
# can be incompatible with newer pytest versions (import_path signature changes).
# This repo's unit tests do not rely on launch_testing, so disable it to keep
# `pytest` runnable in vanilla dev/CI containers.
addopts = -p no:launch_testing -p no:launch_testing.pytest -p no:launch_testing_ros_pytest_entrypoint
